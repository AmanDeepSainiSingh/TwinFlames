<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>twinflames</title>
<meta name="description" content="a personalized job hunt dashboard">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fdfaf6;
    --navy: #1e2a44;
    --navy-soft: #4a5573;
    --muted: #7a8194;
    --line: rgba(30, 42, 68, 0.08);

    --pink-50: #fff5f8;
    --pink-100: #ffe4ec;
    --pink-200: #ffc4d6;
    --pink-300: #f7afc4;
    --pink-400: #ea8aa7;
    --pink-600: #c95f80;
    --pink-800: #8c3858;

    --blue-50: #f0f6fc;
    --blue-100: #e1edf9;
    --blue-200: #c5dcf0;
    --blue-300: #a8c5e8;
    --blue-400: #80a8d2;
    --blue-600: #5079a8;
    --blue-800: #2d4f7a;

    --gold: #c98c4a;
    --green: #4a9b6e;
  }

  body {
    font-family: 'Outfit', sans-serif;
    color: var(--navy);
    background:
      radial-gradient(circle at 10% 0%, var(--pink-100) 0%, transparent 50%),
      radial-gradient(circle at 90% 100%, var(--blue-100) 0%, transparent 50%),
      var(--bg);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  .shape {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
    filter: blur(40px); opacity: 0.5;
    animation: drift 14s ease-in-out infinite alternate;
  }
  .shape.s1 { width: 220px; height: 220px; background: var(--pink-200); top: 8%; left: -60px; }
  .shape.s2 { width: 280px; height: 280px; background: var(--blue-200); bottom: 5%; right: -80px; animation-delay: -4s; }
  .shape.s3 { width: 150px; height: 150px; background: var(--pink-100); top: 55%; right: 10%; animation-delay: -8s; }
  @keyframes drift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(30px,-25px) scale(1.1); }
  }

  .container {
    max-width: 720px; margin: 0 auto;
    padding: 64px 28px 80px;
    position: relative; z-index: 1;
  }

  /* HEADER */
  .header { text-align: center; margin-bottom: 48px; }
  .brand {
    display: inline-flex; align-items: center; gap: 16px;
    font-weight: 300; font-size: 12px;
    letter-spacing: 7px; text-transform: uppercase;
    color: var(--navy-soft); margin-bottom: 32px;
  }
  .flame {
    width: 9px; height: 9px; border-radius: 50%;
    animation: pulse 2.6s ease-in-out infinite;
  }
  .flame.pink {
    background: var(--pink-400);
    box-shadow: 0 0 14px var(--pink-300), 0 0 28px var(--pink-200);
  }
  .flame.blue {
    background: var(--blue-400);
    box-shadow: 0 0 14px var(--blue-300), 0 0 28px var(--blue-200);
    animation-delay: 1.3s;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50%      { transform: scale(1.5); opacity: 1; }
  }
  .quote {
    font-family: 'Fraunces', serif; font-style: italic; font-weight: 400;
    font-size: 30px; line-height: 1.32;
    color: var(--navy);
    max-width: 540px; margin: 0 auto 24px;
    letter-spacing: -0.01em;
  }
  .greeting {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 17px; color: var(--navy-soft);
  }
  .greeting .name {
    color: var(--pink-600); font-weight: 500; font-style: normal;
    font-family: 'Outfit', sans-serif; letter-spacing: 0.5px;
  }

  /* FILTERS */
  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 22px;
  }
  .pill {
    padding: 8px 18px; border-radius: 999px;
    border: 1px solid var(--line); background: white;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 400;
    color: var(--navy-soft); cursor: pointer;
    transition: all 0.25s ease;
  }
  .pill:hover { border-color: var(--pink-300); color: var(--pink-800); transform: translateY(-1px); }
  .pill.active {
    background: linear-gradient(135deg, var(--pink-400) 0%, var(--blue-400) 100%);
    color: white; border-color: transparent; font-weight: 500;
    box-shadow: 0 4px 12px rgba(234, 138, 167, 0.25);
  }

  /* STATUS */
  .status-bar {
    display: flex; justify-content: center; align-items: center;
    gap: 10px; font-size: 12px; color: var(--muted);
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--pink-400);
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  .refresh-btn {
    background: white; border: 1px solid var(--line);
    color: var(--navy-soft); padding: 5px 11px;
    border-radius: 999px; font-size: 11px;
    font-family: 'Outfit', sans-serif; cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex; align-items: center; gap: 5px;
    letter-spacing: 0.3px;
  }
  .refresh-btn:hover {
    border-color: var(--pink-300); color: var(--pink-800);
    transform: translateY(-1px);
  }
  .refresh-btn.spinning .refresh-icon { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .refresh-icon { display: inline-block; font-size: 13px; }

  /* CARDS */
  .job-list { display: flex; flex-direction: column; gap: 14px; }

  .job-card {
    background: white; border: 1px solid var(--line);
    border-radius: 18px; padding: 22px 26px;
    position: relative; overflow: hidden;
    transition: transform 0.28s ease, box-shadow 0.28s ease;
    opacity: 0; transform: translateY(8px);
    animation: cardIn 0.5s ease forwards;
  }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
  .job-card::before {
    content: ''; position: absolute;
    left: 0; top: 18px; bottom: 18px;
    width: 3px; border-radius: 2px;
    background: var(--pink-400);
  }
  .job-card.cat-blue::before { background: var(--blue-400); }
  .job-card.cat-gray::before { background: #d4d4d8; }
  .job-card:hover {
    transform: translateY(-3px);
    box-shadow:
      0 14px 32px rgba(234, 138, 167, 0.10),
      0 6px 16px rgba(128, 168, 210, 0.08);
  }

  .job-header-row {
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: 12px;
    margin-bottom: 10px;
  }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .job-tag {
    display: inline-block; padding: 3px 11px;
    border-radius: 999px; font-size: 10px;
    font-weight: 500; letter-spacing: 1.6px;
    text-transform: uppercase;
  }
  .job-tag.pink { background: var(--pink-50); color: var(--pink-800); }
  .job-tag.blue { background: var(--blue-50); color: var(--blue-800); }
  .job-tag.gray { background: #f4f4f5; color: #52525b; }
  .job-tag.fit {
    background: linear-gradient(135deg, #fff6e0, #fdeec5);
    color: var(--gold);
    border: 1px solid rgba(201, 140, 74, 0.25);
  }

  .job-title {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 500;
    color: var(--navy); margin-bottom: 4px;
    letter-spacing: -0.01em; line-height: 1.25;
  }
  .job-employer { font-size: 14px; color: var(--navy-soft); margin-bottom: 12px; }

  .job-meta {
    display: flex; flex-wrap: wrap; gap: 14px;
    font-size: 12.5px; color: var(--muted);
    margin-bottom: 14px;
  }
  .job-meta-item { display: flex; align-items: center; gap: 5px; }
  .job-salary { color: var(--pink-600); font-weight: 500; }
  .job-distance { color: var(--blue-600); font-weight: 500; }

  .job-summary {
    font-size: 13.5px; color: var(--navy-soft);
    line-height: 1.6; margin-bottom: 16px;
    padding: 12px 14px;
    background: rgba(255, 244, 248, 0.4);
    border-radius: 10px;
    border-left: 2px solid var(--pink-200);
  }

  .job-actions {
    display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap;
  }

  .btn-apply {
    background: linear-gradient(135deg, var(--pink-400) 0%, var(--blue-400) 100%);
    color: white; border: none;
    padding: 9px 20px; border-radius: 999px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    letter-spacing: 0.2px;
  }
  .btn-apply:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(234, 138, 167, 0.30); }

  .btn-secondary {
    background: white; border: 1px solid var(--line);
    color: var(--navy-soft);
    padding: 8px 16px; border-radius: 999px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px; cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-secondary:hover { border-color: var(--pink-300); color: var(--pink-800); }
  .btn-secondary.active {
    background: var(--pink-50); border-color: var(--pink-300); color: var(--pink-800);
  }

  .btn-save {
    background: white; border: 1px solid var(--line);
    color: var(--navy-soft);
    padding: 0; border-radius: 50%;
    cursor: pointer; font-size: 14px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
  }
  .btn-save:hover { color: var(--pink-600); border-color: var(--pink-300); }
  .btn-save.saved { color: var(--pink-600); border-color: var(--pink-300); background: var(--pink-50); }

  /* Details panel */
  .details-panel {
    max-height: 0; overflow: hidden;
    transition: max-height 0.5s ease, margin-top 0.4s ease, padding 0.4s ease, opacity 0.3s ease;
    margin-top: 0; opacity: 0;
  }
  .details-panel.open {
    max-height: 3000px;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    opacity: 1;
  }
  .details-panel h4 {
    font-family: 'Fraunces', serif;
    font-style: italic; font-weight: 500;
    font-size: 14px; color: var(--navy);
    margin: 16px 0 8px;
    letter-spacing: 0.2px;
  }
  .details-panel h4:first-child { margin-top: 0; }
  .details-panel ul {
    list-style: none; padding: 0;
    font-size: 13px; color: var(--navy-soft);
    line-height: 1.7;
  }
  .details-panel li {
    padding-left: 16px; position: relative;
    margin-bottom: 4px;
  }
  .details-panel li::before {
    content: '•'; color: var(--pink-400);
    position: absolute; left: 4px;
  }
  .details-panel p.overview {
    font-size: 13.5px; color: var(--navy-soft);
    line-height: 1.7; margin-bottom: 10px;
  }
  .loading-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--muted); font-style: italic;
  }
  .loading-dots::after {
    content: ''; display: inline-block; width: 1em;
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }

  /* Prep notes block */
  .prep-block {
    background: linear-gradient(135deg, var(--blue-50), var(--pink-50));
    border-radius: 14px; padding: 16px 18px;
    margin-top: 14px;
    border: 1px solid rgba(255, 255, 255, 0.6);
  }
  .prep-block h4 {
    margin-top: 0;
    color: var(--blue-800);
    display: flex; align-items: center; gap: 6px;
  }
  .prep-note {
    display: flex; gap: 10px; margin-bottom: 10px;
    font-size: 13px; line-height: 1.6;
    color: var(--navy-soft);
  }
  .prep-note:last-child { margin-bottom: 0; }
  .prep-icon {
    flex-shrink: 0; width: 20px; height: 20px;
    border-radius: 50%; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
  }
  .prep-icon.strength { background: rgba(74, 155, 110, 0.15); color: var(--green); }
  .prep-icon.tip      { background: var(--blue-100); color: var(--blue-800); }
  .prep-icon.bring    { background: var(--pink-100); color: var(--pink-800); }

  .grid-2 {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-top: 4px;
  }
  @media (max-width: 540px) {
    .grid-2 { grid-template-columns: 1fr; gap: 4px; }
  }

  /* STATES */
  .state-msg {
    text-align: center; padding: 60px 20px;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 17px; color: var(--muted);
  }
  .state-msg .small {
    display: block; margin-top: 8px;
    font-size: 13px; font-style: normal;
    font-family: 'Outfit', sans-serif;
  }

  /* EXTERNAL */
  .external-section {
    margin-top: 44px; padding: 30px 28px;
    background: linear-gradient(135deg, var(--pink-50) 0%, var(--blue-50) 100%);
    border-radius: 22px; text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.6);
  }
  .external-title {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 19px; color: var(--navy-soft);
    margin-bottom: 6px;
  }
  .external-note { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
  .external-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .ext-btn {
    background: white; border: 1px solid var(--line);
    padding: 11px 22px; border-radius: 999px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; color: var(--navy);
    cursor: pointer; text-decoration: none;
    transition: all 0.2s ease; display: inline-block;
  }
  .ext-btn:hover {
    border-color: var(--pink-300); color: var(--pink-800);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(234, 138, 167, 0.10);
  }

  /* FOOTER */
  .footer { margin-top: 56px; text-align: center; }
  .footer-divider {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; color: var(--pink-300);
    margin-bottom: 16px; font-size: 14px;
  }
  .footer-divider::before,
  .footer-divider::after {
    content: '';
    height: 1px; width: 50px;
    background: linear-gradient(90deg, transparent, var(--pink-200), transparent);
  }
  .footer-sign {
    font-family: 'Outfit', sans-serif;
    font-size: 11px; color: var(--muted);
    letter-spacing: 2.5px; text-transform: uppercase;
  }
  .footer-sign .heart { color: var(--pink-400); margin: 0 6px; }

  @media (max-width: 600px) {
    .quote { font-size: 22px; }
    .container { padding: 44px 16px 60px; }
    .brand { font-size: 11px; letter-spacing: 5px; gap: 12px; }
    .job-card { padding: 20px 20px; }
    .job-title { font-size: 19px; }
  }
</style>
</head>
<body>

<div class="shape s1"></div>
<div class="shape s2"></div>
<div class="shape s3"></div>

<div class="container">

  <header class="header">
    <div class="brand">
      <span class="flame pink"></span>
      twinflames
      <span class="flame blue"></span>
    </div>
    <p class="quote">"A good friend is like a four-leaf clover; hard to find and lucky to have."</p>
    <p class="greeting">hi <span class="name">Arsh</span>, here are today's openings near you</p>
  </header>

  <div class="filters" id="filters">
    <button class="pill active" data-filter="all">All</button>
    <button class="pill" data-filter="best-fit">★ Best fit</button>
    <button class="pill" data-filter="healthcare">Healthcare</button>
    <button class="pill" data-filter="retail-cafe">Retail / Cafe</button>
    <button class="pill" data-filter="admin">Admin</button>
    <button class="pill" data-filter="other">Other</button>
    <button class="pill" data-filter="saved">Saved</button>
  </div>

  <div class="status-bar">
    <span class="status-dot"></span>
    <span id="status-text">loading openings…</span>
    <button class="refresh-btn" id="refresh-btn" title="Check for new jobs">
      <span class="refresh-icon">⟳</span> Refresh
    </button>
  </div>

  <div class="job-list" id="job-list"></div>

  <div class="external-section">
    <p class="external-title">want to look further?</p>
    <p class="external-note">opens a pre-filled search in a new tab</p>
    <div class="external-btns">
      <a class="ext-btn" id="indeed-btn" target="_blank" rel="noopener">Search Indeed ↗</a>
      <a class="ext-btn" id="linkedin-btn" target="_blank" rel="noopener">Search LinkedIn ↗</a>
      <a class="ext-btn" id="jobbank-btn" target="_blank" rel="noopener">All Job Bank ↗</a>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-divider">✦</div>
    <p class="footer-sign">built by Greeky <span class="heart">♡</span></p>
  </footer>

</div>

<script>
  // ─── Driving distance from home (320 Mill St, Woodstock) ───
  const DISTANCES = {
    'woodstock':  { min: 5,  km: 3 },
    'ingersoll':  { min: 14, km: 15 },
    'tavistock':  { min: 22, km: 25 },
    'beachville': { min: 8,  km: 8 },
    'norwich':    { min: 18, km: 20 },
    'innerkip':   { min: 12, km: 12 },
    'embro':      { min: 17, km: 17 },
    'princeton':  { min: 16, km: 18 },
    'bright':     { min: 17, km: 16 },
    'drumbo':     { min: 22, km: 24 },
    'oxford':     { min: 12, km: 12 },
  };
  function distanceFor(location) {
    if (!location) return null;
    const loc = location.toLowerCase();
    for (const city in DISTANCES) {
      if (loc.includes(city)) return DISTANCES[city];
    }
    return null;
  }

  // ─── Mock fallback ───
  const MOCK_JOBS = [
    { title: "Sandwich Artist", employer: "Subway", category: "retail-cafe",
      location: "Woodstock (ON)", salary: "$17.20/hr", job_type: "Part-time",
      posted: "Today", url: "https://www.jobbank.gc.ca/jobsearch/jobposting/12345678",
      summary: "Prepare and serve food. Cash handling. Customer service." },
    { title: "Medical Office Assistant", employer: "Woodstock Family Medical Centre", category: "healthcare",
      location: "Woodstock (ON)", salary: "$19.50/hr", job_type: "Part-time",
      posted: "2 days ago", url: "https://www.jobbank.gc.ca/jobsearch/jobposting/12345679",
      summary: "Greet patients, schedule appointments, manage files. Health science background an asset." },
    { title: "Barista", employer: "Tim Hortons", category: "retail-cafe",
      location: "Woodstock (ON)", salary: "$17.20/hr", job_type: "Part-time",
      posted: "Today", url: "https://www.jobbank.gc.ca/jobsearch/jobposting/12345680",
      summary: "Prepare beverages, food prep, customer service, cash handling." },
    { title: "Pharmacy Assistant", employer: "Shoppers Drug Mart", category: "healthcare",
      location: "Ingersoll (ON)", salary: "$18 to $20/hr", job_type: "Part-time",
      posted: "4 days ago", url: "https://www.jobbank.gc.ca/jobsearch/jobposting/12345681",
      summary: "Assist pharmacist, restock shelves, customer support, basic dispensing." },
    { title: "Cashier", employer: "Walmart Supercentre", category: "retail-cafe",
      location: "Woodstock (ON)", salary: "$17.20/hr", job_type: "Part-time",
      posted: "1 day ago", url: "https://www.jobbank.gc.ca/jobsearch/jobposting/12345682",
      summary: "Operate cash register, customer service, handle returns." },
    { title: "Receptionist", employer: "Oxford Dental Group", category: "admin",
      location: "Woodstock (ON)", salary: "$17.50/hr", job_type: "Full-time",
      posted: "5 days ago", url: "https://www.jobbank.gc.ca/jobsearch/jobposting/12345683",
      summary: "Greet patients, schedule, phones, billing assistance." },
    { title: "Sales Associate", employer: "Shoppers Drug Mart", category: "retail-cafe",
      location: "Tavistock (ON)", salary: "$17.20 to $18/hr", job_type: "Part-time",
      posted: "Today", url: "https://www.jobbank.gc.ca/jobsearch/jobposting/12345684",
      summary: "Stock shelves, assist customers, light cashier duties." },
  ];

  // ─── State ───
  let allJobs = [];
  let activeFilter = 'all';
  let savedIds = JSON.parse(localStorage.getItem('twinflames_saved') || '[]');
  let detailsCache = {};

  const $list       = document.getElementById('job-list');
  const $statusText = document.getElementById('status-text');
  const $filters    = document.getElementById('filters');
  const $refresh    = document.getElementById('refresh-btn');

  document.getElementById('indeed-btn').href =
    'https://ca.indeed.com/jobs?q=part+time&l=Woodstock%2C+ON&radius=25';
  document.getElementById('linkedin-btn').href =
    'https://www.linkedin.com/jobs/search/?keywords=&location=Woodstock%2C%20Ontario%2C%20Canada&distance=25';
  document.getElementById('jobbank-btn').href =
    'https://www.jobbank.gc.ca/jobsearch/jobsearch?searchstring=&locationstring=Woodstock%2C+ON&sort=M';

  // ─── Helpers ───
  function jobId(j) {
    return (j.title + '|' + j.employer + '|' + j.location).toLowerCase().replace(/\s+/g, '-');
  }
  function categoryClass(cat) {
    if (cat === 'retail-cafe') return 'cat-blue';
    if (cat === 'admin' || cat === 'other') return 'cat-gray';
    return '';
  }
  function tagClass(cat) {
    if (cat === 'healthcare')   return 'pink';
    if (cat === 'retail-cafe')  return 'blue';
    return 'gray';
  }
  function categoryLabel(cat) {
    if (cat === 'healthcare')   return 'Healthcare';
    if (cat === 'retail-cafe')  return 'Retail / Cafe';
    if (cat === 'admin')        return 'Admin';
    return 'Other';
  }
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
    );
  }

  // ─── Best fit scoring ───
  function fitScore(job) {
    const t = (job.title + ' ' + (job.summary || '') + ' ' + (job.employer || '')).toLowerCase();
    let score = 0;
    if (/sandwich|subway|barista|cashier|food counter|food service|kitchen helper|server\b/.test(t)) score += 30;
    if (/medical office|pharmacy assist|dental|optometr|veterinary assist|clinic|health care aide|patient/.test(t)) score += 28;
    if (/no experience|will train|training provided|entry[- ]level|student/.test(t)) score += 15;
    if (job.job_type === 'Part-time') score += 10;
    if ((job.location || '').toLowerCase().includes('woodstock')) score += 8;
    const p = (job.posted || '').toLowerCase();
    if (p === 'today') score += 5;
    else if (p === 'yesterday') score += 3;
    return score;
  }
  function markBestFits(jobs) {
    const scored = jobs.map(j => ({ j, s: fitScore(j) }));
    scored.sort((a, b) => b.s - a.s);
    const top = Math.min(5, scored.length);
    const minFit = 35;
    const ids = new Set();
    for (let i = 0; i < top; i++) {
      if (scored[i].s >= minFit) ids.add(jobId(scored[i].j));
    }
    jobs.forEach(j => { j._bestFit = ids.has(jobId(j)); });
    return jobs;
  }

  // ─── Generate prep notes from real job requirements ───
  function generatePrepNotes(details, job) {
    const notes = [];
    const reqText = [
      ...(details.requirements || []),
      ...(details.experience  || []),
      ...(details.tasks       || []),
      ...(details.education   || []),
      ...(details.work_setting|| []),
      details.overview || ''
    ].join(' ').toLowerCase();

    const exp = (details.experience || []).join(' ').toLowerCase();
    const edu = (details.education  || []).join(' ').toLowerCase();
    const langs = (details.languages || []).join(' ').toLowerCase();

    // STRENGTHS to lead with (matched against her Subway + health science background)
    if (/cash|register|pos|point of sale|payment/.test(reqText)) {
      notes.push({ type: 'strength', text: "Your Subway experience covers cash handling, mention specific moments (counting drawer, processing returns, balancing at end of shift)." });
    }
    if (/customer service|customer experience|guest|client/.test(reqText)) {
      notes.push({ type: 'strength', text: "Lead with concrete Subway customer stories: a tough order you handled, a complaint you turned around, a regular you remember." });
    }
    if (/food|hygiene|sanitation|cleanliness|kitchen|prep/.test(reqText)) {
      notes.push({ type: 'strength', text: "Food safety habits from Subway transfer directly: sanitation, glove changes, temperature checks. Say it plainly." });
    }
    if (/fast[- ]paced|busy|rush|high volume|multitask/.test(reqText)) {
      notes.push({ type: 'strength', text: "Lunch rush at Subway is a fast-paced multitasking story, prep one." });
    }
    if (/team|collaborate|coworker/.test(reqText)) {
      notes.push({ type: 'strength', text: "Mention covering shifts and training new hires at Subway if you've done that." });
    }
    if (/medical|patient|clinic|pharmacy|health|hospital/.test(reqText)) {
      notes.push({ type: 'strength', text: "Mention your health science studies and that you understand patient confidentiality (PHIPA in Ontario)." });
    }
    if (/computer|email|microsoft|excel|word|outlook|software|schedul|appointment|booking/.test(reqText)) {
      notes.push({ type: 'strength', text: "Highlight school assignments done in Word/Excel, comfort with Gmail and Outlook, quick to learn new scheduling software." });
    }
    if (/communication|phone|telephone/.test(reqText)) {
      notes.push({ type: 'strength', text: "Phone confidence comes from customer interaction, mention answering the Subway phone for catering orders if relevant." });
    }

    // TIPS based on experience/education requirements
    if (/no experience|will train|training provided/.test(exp) || /no experience|will train/.test(reqText)) {
      notes.push({ type: 'tip', text: "Training is provided, so focus on reliability, willingness to learn, and your availability around school." });
    } else if (/(1 year|1\+ year|6 months|less than 2 year|1 to less than)/.test(exp)) {
      notes.push({ type: 'tip', text: "They want a bit of experience. Frame Subway with specific responsibilities (cash, food prep, opening/closing if you did those)." });
    } else if (/(2 year|3 year|2\+ year)/.test(exp)) {
      notes.push({ type: 'tip', text: "They list 2+ years experience. Apply anyway if interested, list every responsibility from Subway and emphasize quick learning." });
    }

    if (/high school|secondary/.test(edu) && !/no degree|will train/.test(reqText)) {
      notes.push({ type: 'tip', text: "High school listed as needed, your in-progress health science degree exceeds that." });
    }
    if (/smart serve|food handler|food safety certif/.test(reqText)) {
      notes.push({ type: 'tip', text: "Mentions Smart Serve or Food Handler certification, check if you have it, both are quick online courses (~$35) if you don't." });
    }
    if (/cpr|first aid/.test(reqText)) {
      notes.push({ type: 'tip', text: "CPR/First Aid mentioned, helpful if you have it, otherwise say you're willing to certify." });
    }
    if (langs && !langs.includes('english')) {
      notes.push({ type: 'tip', text: "Listed language: " + (details.languages || []).join(', ') + "." });
    }

    // BRING (always practical)
    notes.push({ type: 'bring', text: "Bring a printed resume, two references with phone numbers, and your availability written down." });

    // If still very few notes, add general practice prompt
    if (notes.length < 4) {
      notes.push({ type: 'tip', text: "Practice a 30-second self-intro that ties your school path to why this role fits your schedule and goals." });
    }

    return notes;
  }

  // ─── Render ───
  function render() {
    let jobs = allJobs.slice();
    if (activeFilter === 'saved')         jobs = jobs.filter(j => savedIds.includes(jobId(j)));
    else if (activeFilter === 'best-fit') jobs = jobs.filter(j => j._bestFit);
    else if (activeFilter !== 'all')      jobs = jobs.filter(j => j.category === activeFilter);

    if (jobs.length === 0) {
      $list.innerHTML = `
        <div class="state-msg">
          ${activeFilter === 'saved'
            ? 'no saved jobs yet<span class="small">tap the heart on any card to save it for later</span>'
            : 'nothing here right now<span class="small">try another filter, or hit refresh ↻</span>'}
        </div>`;
      return;
    }

    $list.innerHTML = jobs.map((j, i) => {
      const id = jobId(j);
      const saved = savedIds.includes(id);
      const dist = distanceFor(j.location);
      return `
        <div class="job-card ${categoryClass(j.category)}" style="animation-delay:${Math.min(i * 0.05, 0.5)}s">
          <div class="job-header-row">
            <div class="tag-row">
              <span class="job-tag ${tagClass(j.category)}">${categoryLabel(j.category)}</span>
              ${j._bestFit ? '<span class="job-tag fit">★ Great fit</span>' : ''}
            </div>
            <button class="btn-save ${saved ? 'saved' : ''}" data-id="${id}" aria-label="${saved ? 'Unsave' : 'Save'}">${saved ? '♥' : '♡'}</button>
          </div>
          <h3 class="job-title">${escapeHtml(j.title)}</h3>
          <p class="job-employer">${escapeHtml(j.employer)}</p>
          <div class="job-meta">
            <span class="job-meta-item">📍 ${escapeHtml(j.location)}</span>
            ${dist ? `<span class="job-meta-item job-distance">🚗 ~${dist.min} min · ${dist.km} km</span>` : ''}
            ${j.salary ? `<span class="job-meta-item job-salary">${escapeHtml(j.salary)}</span>` : ''}
            ${j.job_type ? `<span class="job-meta-item">${escapeHtml(j.job_type)}</span>` : ''}
            ${j.posted ? `<span class="job-meta-item">${escapeHtml(j.posted)}</span>` : ''}
          </div>
          ${j.summary ? `<p class="job-summary">${escapeHtml(j.summary)}</p>` : ''}
          <div class="job-actions">
            <a class="btn-apply" href="${j.url}" target="_blank" rel="noopener">Apply on Job Bank ↗</a>
            <button class="btn-secondary btn-details" data-id="${id}" data-url="${j.url}" data-job-idx="${i}">View details &amp; prep notes</button>
          </div>
          <div class="details-panel" id="panel-${id}"></div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.btn-save').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        if (savedIds.includes(id)) savedIds = savedIds.filter(s => s !== id);
        else savedIds.push(id);
        localStorage.setItem('twinflames_saved', JSON.stringify(savedIds));
        render();
      });
    });

    document.querySelectorAll('.btn-details').forEach(btn => {
      btn.addEventListener('click', () => showDetails(btn, jobs[parseInt(btn.dataset.jobIdx, 10)]));
    });
  }

  function sectionHtml(title, items) {
    if (!items || !items.length) return '';
    return `<h4>${escapeHtml(title)}</h4><ul>${items.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>`;
  }

  function prepNotesHtml(notes) {
    if (!notes.length) return '';
    return `
      <div class="prep-block">
        <h4>💡 Prep notes for Arsh</h4>
        ${notes.map(n => `
          <div class="prep-note">
            <span class="prep-icon ${n.type}">${n.type === 'strength' ? '✓' : n.type === 'bring' ? '★' : '→'}</span>
            <span>${escapeHtml(n.text)}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  async function showDetails(btn, job) {
    const id  = btn.dataset.id;
    const url = btn.dataset.url;
    const panel = document.getElementById('panel-' + id);
    if (!panel) return;

    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
      panel.innerHTML = '';
      btn.classList.remove('active');
      btn.textContent = 'View details & prep notes';
      return;
    }
    btn.classList.add('active');
    btn.textContent = 'Hide details';
    panel.classList.add('open');
    panel.innerHTML = '<div class="loading-row">fetching the full posting<span class="loading-dots"></span></div>';

    let d = detailsCache[url];
    if (!d) {
      try {
        const resp = await fetch('/api/job-details?url=' + encodeURIComponent(url));
        d = await resp.json();
        detailsCache[url] = d;
      } catch (err) {
        d = { error: String(err) };
      }
    }

    if (d.expired) {
      panel.innerHTML = `
        <div style="padding:14px 16px;background:#fff3f3;border-radius:12px;border:1px solid #f8d4d4;">
          <p style="font-size:13.5px;color:#8c3858;font-weight:500;margin-bottom:6px;">⚠ this posting has expired</p>
          <p style="font-size:13px;color:var(--navy-soft);line-height:1.6;">
            The role was filled or removed since the search picked it up. Try the Search Job Bank button below to find similar openings, or check back after a refresh.
          </p>
        </div>
      `;
      return;
    }

    if (d.error || (!d.overview && !d.requirements?.length && !d.tasks?.length && !d.experience?.length)) {
      panel.innerHTML = `
        <p class="loading-row">couldn't pull details from this posting, here are general prep notes:</p>
        ${prepNotesHtml(generatePrepNotes({}, job))}
      `;
      return;
    }

    let html = '';
    if (d.overview) html += `<p class="overview">${escapeHtml(d.overview)}</p>`;

    // Required-side info
    const requiredHas = (d.education?.length || d.experience?.length || d.languages?.length || d.requirements?.length);
    if (requiredHas) {
      html += '<h4>What it requires</h4>';
      html += '<div class="grid-2">';
      html += '<div>';
      html += sectionHtml('Education', d.education);
      html += sectionHtml('Experience', d.experience);
      html += sectionHtml('Languages', d.languages);
      html += '</div><div>';
      html += sectionHtml('Skills / requirements', d.requirements);
      html += '</div></div>';
    }

    if (d.tasks?.length) html += sectionHtml('What you would do', d.tasks);
    if (d.work_setting?.length) html += sectionHtml('Work setting', d.work_setting);

    // Tailored prep notes
    html += prepNotesHtml(generatePrepNotes(d, job));

    if (d.benefits?.length) html += sectionHtml('Benefits', d.benefits);
    if (d.transportation?.length) html += sectionHtml('Transportation', d.transportation);

    panel.innerHTML = html;
  }

  // ─── Wire up ───
  $filters.addEventListener('click', e => {
    if (e.target.classList.contains('pill')) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      e.target.classList.add('active');
      activeFilter = e.target.dataset.filter;
      render();
    }
  });
  $refresh.addEventListener('click', () => loadJobs(true));

  async function loadJobs(forceRefresh = false) {
    $refresh.classList.add('spinning');
    $statusText.textContent = forceRefresh ? 'checking for new jobs…' : 'loading openings…';
    try {
      const path = '/api/jobs' + (forceRefresh ? '?refresh=' + Date.now() : '');
      const resp = await fetch(path, { cache: forceRefresh ? 'no-store' : 'default' });
      if (!resp.ok) throw new Error('api not ok');
      const data = await resp.json();
      if (!data.jobs || data.jobs.length === 0) throw new Error('no jobs returned');
      allJobs = markBestFits(data.jobs);
      const stamp = data.updated_label || 'just now';
      $statusText.textContent = `${allJobs.length} openings near Woodstock · updated ${stamp}`;
    } catch (err) {
      allJobs = markBestFits(MOCK_JOBS.slice());
      $statusText.textContent = `${allJobs.length} sample openings (preview mode)`;
    }
    $refresh.classList.remove('spinning');
    render();
  }

  loadJobs();
</script>
</body>
</html>
